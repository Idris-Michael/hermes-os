<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Severus Connects — System Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:    #C9A84C;
  --gold15:  rgba(201,168,76,0.15);
  --gold30:  rgba(201,168,76,0.30);
  --gold60:  rgba(201,168,76,0.60);
  --bg:      #141414;
  --bg2:     #1a1a1a;
  --bg3:     #202020;
  --border:  rgba(255,255,255,0.08);
  --text:    #e8e4d0;
  --muted:   rgba(232,228,208,0.40);
  --mono:    "JetBrains Mono", monospace;
  --sidebar: 300px;
}

html, body {
  width: 100%; height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 38px;
  padding: 0 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-left {
  display: flex; align-items: center; gap: 16px;
}
.brand {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--gold); text-transform: uppercase;
}
.topbar-sep { width: 1px; height: 16px; background: var(--border); }
.topbar-meta {
  font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
}

/* workflow tabs */
.wf-tabs {
  display: flex; gap: 2px;
}
.wf-tab {
  padding: 4px 12px;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 3px;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: 0.06em;
}
.wf-tab:hover { color: var(--text); border-color: var(--border); }
.wf-tab.active {
  color: var(--gold);
  background: var(--gold15);
  border-color: var(--gold30);
}

/* ── MAIN LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── DIAGRAM AREA ── */
.diagram-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
}
.diagram-scroll {
  min-width: 1200px;
  min-height: 100%;
  position: relative;
}

/* ── LANE HEADERS ── */
.lane-headers {
  display: flex;
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.lane-header {
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
  padding: 8px 12px;
  border-right: 1px solid var(--border);
  white-space: nowrap;
}

/* ── CANVAS ── */
.canvas {
  position: relative;
}
.lane-bg {
  position: absolute;
  top: 0; bottom: 0;
  border-right: 1px solid var(--border);
  pointer-events: none;
}
.lane-bg:nth-child(odd) { background: rgba(255,255,255,0.01); }

/* SVG connections */
#svg-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 5;
}

/* ── NODES ── */
.node {
  position: absolute;
  z-index: 10;
  min-width: 130px;
  max-width: 160px;
  padding: 8px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  user-select: none;
}
.node:hover {
  border-color: rgba(255,255,255,0.2);
}
.node.highlighted {
  border-color: var(--gold) !important;
  background: var(--gold15) !important;
  box-shadow: 0 0 0 1px var(--gold30), 0 4px 20px rgba(201,168,76,0.2);
}
.node.dimmed {
  opacity: 0.2;
}
.node-name {
  font-size: 11px; font-weight: 700; color: var(--text);
  line-height: 1.2; margin-bottom: 3px;
}
.node-sub {
  font-size: 9px; color: var(--muted);
  line-height: 1.4; letter-spacing: 0.02em;
}

/* step number badge on edge */
.edge-badge {
  position: absolute;
  z-index: 15;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--bg);
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.edge-badge.visible { opacity: 1; }

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
}
.sidebar-section {
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-section-header {
  padding: 8px 12px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
  color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}

/* FLOWS list */
.flows-list {
  overflow-y: auto;
  max-height: 300px;
}
.flow-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.flow-item:hover { background: rgba(255,255,255,0.03); }
.flow-item.active {
  background: var(--gold15);
  border-left: 2px solid var(--gold);
}
.flow-item.active .flow-name { color: var(--gold); }
.flow-name {
  font-size: 11px; font-weight: 700; color: var(--text);
  margin-bottom: 3px; line-height: 1.2;
}
.flow-desc {
  font-size: 9px; color: var(--muted); line-height: 1.5;
}
.clear-btn {
  display: block;
  margin: 8px 12px;
  padding: 5px 10px;
  font-family: var(--mono); font-size: 9px;
  color: var(--muted); background: transparent;
  border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer;
  transition: all 0.12s; letter-spacing: 0.08em;
}
.clear-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* STEPS panel */
.steps-panel {
  flex: 1;
  overflow-y: auto;
}
.steps-empty {
  padding: 20px 12px;
  font-size: 10px; color: var(--muted); line-height: 1.6;
}
.step-item {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
}
.step-item.show { opacity: 1; transform: translateY(0); }
.step-num {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--gold); color: var(--bg);
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.step-body {}
.step-route {
  font-size: 10px; font-weight: 700; color: var(--text);
  margin-bottom: 3px; line-height: 1.3;
}
.step-arrow { color: var(--gold); margin: 0 3px; }
.step-to { color: var(--gold); }
.step-data {
  font-size: 9px; color: var(--muted); line-height: 1.5;
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }

/* SVG path */
.flow-path {
  fill: none;
  stroke: var(--gold);
  stroke-width: 1.5;
  opacity: 0;
  transition: opacity 0.25s;
}
.flow-path.dim {
  stroke: rgba(255,255,255,0.06);
  opacity: 1;
}
.flow-path.active {
  opacity: 1;
  stroke-dasharray: 5 3;
  animation: dash 0.6s linear infinite;
}

@keyframes dash {
  to { stroke-dashoffset: -16; }
}
</style>
</head>
<body>

<div class="topbar">

// ═══════════════════════════════════════
// LAYOUT CONFIG
// ═══════════════════════════════════════
const LANE_W   = 180;
const NODE_H   = 52;
const ROW_H    = 80;
const CANVAS_PAD_TOP  = 24;
const CANVAS_PAD_LEFT = 0;

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let activeWF   = WORKFLOWS[0];
let activeFlow = null;
const badges   = [];

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function nodeCenter(nodeEl) {
  const canvas = document.getElementById('canvas');
  const cr = canvas.getBoundingClientRect();
  const nr = nodeEl.getBoundingClientRect();
  return {
    x: nr.left - cr.left + nr.width / 2,
    y: nr.top  - cr.top  + nr.height / 2,
  };
}

function nodePos(node) {
  const x = CANVAS_PAD_LEFT + node.lane * LANE_W + (LANE_W - 140) / 2;
  const y = CANVAS_PAD_TOP  + node.row  * ROW_H;
  return { x, y };
}

function canvasHeight() {
  const maxRow = Math.max(...activeWF.nodes.map(n => n.row));
  return CANVAS_PAD_TOP + (maxRow + 1) * ROW_H + NODE_H + CANVAS_PAD_TOP;
}

// ═══════════════════════════════════════
// RENDER WORKFLOW TABS
// ═══════════════════════════════════════
function renderTabs() {
  const wrap = document.getElementById('wf-tabs');
  wrap.innerHTML = WORKFLOWS.map(wf => `
    <button class="wf-tab ${wf.id === activeWF.id ? 'active' : ''}" data-wf="${wf.id}">
      ${wf.name}
    </button>
  `).join('');
  wrap.querySelectorAll('.wf-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeWF = WORKFLOWS.find(w => w.id === btn.dataset.wf);
      activeFlow = null;
      render();
    });
  });
}

// ═══════════════════════════════════════
// RENDER LANE HEADERS + BACKGROUND
// ═══════════════════════════════════════
function renderLanes() {
  const headers = document.getElementById('lane-headers');
  const canvas  = document.getElementById('canvas');
  const scroll  = document.getElementById('diagram-scroll');

  const totalW = activeWF.lanes.length * LANE_W;
  scroll.style.minWidth = Math.max(totalW + 1, 900) + 'px';

  headers.innerHTML = activeWF.lanes.map(l =>
    `<div class="lane-header" style="width:${LANE_W}px;min-width:${LANE_W}px">${l}</div>`
  ).join('');

  // clear old lane bg divs
  canvas.querySelectorAll('.lane-bg').forEach(el => el.remove());
  const h = canvasHeight();
  canvas.style.height = h + 'px';

  activeWF.lanes.forEach((_, i) => {
    const bg = document.createElement('div');
    bg.className = 'lane-bg';
    bg.style.left  = (i * LANE_W) + 'px';
    bg.style.width = LANE_W + 'px';
    canvas.insertBefore(bg, canvas.firstChild);
  });
}

// ═══════════════════════════════════════
// RENDER NODES
// ═══════════════════════════════════════
function renderNodes() {
  // remove old nodes
  document.querySelectorAll('.node').forEach(el => el.remove());
  const canvas = document.getElementById('canvas');

  const activeNodeIds = new Set();
  if (activeFlow) {
    activeFlow.steps.forEach(s => { activeNodeIds.add(s.from); activeNodeIds.add(s.to); });
  }

  activeWF.nodes.forEach(node => {
    const { x, y } = nodePos(node);
    const el = document.createElement('div');
    el.className = 'node';
    el.id = 'n-' + node.id;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.width = '140px';

    const isHighlighted = !activeFlow || activeNodeIds.has(node.id);
    const isDimmed      = activeFlow  && !activeNodeIds.has(node.id);
    if (isHighlighted && activeFlow) el.classList.add('highlighted');
    if (isDimmed)                    el.classList.add('dimmed');

    el.innerHTML = `<div class="node-name">${node.name}</div><div class="node-sub">${node.sub}</div>`;
    canvas.appendChild(el);
  });
}

// ═══════════════════════════════════════
// RENDER SVG PATHS + BADGES
// ═══════════════════════════════════════
function renderPaths() {
  const svg = document.getElementById('svg-canvas');
  svg.innerHTML = '';
  // clear old badges
  badges.forEach(b => b.remove());
  badges.length = 0;
  const canvas = document.getElementById('canvas');

  // draw all passive edges (dim) first
  if (activeFlow) {
    // get all edges across all flows in this WF
    const allEdges = new Set();
    activeWF.flows.forEach(fl => {
      fl.steps.forEach(s => allEdges.add(s.from + '|' + s.to));
    });
    // draw dim lines for non-active edges
    allEdges.forEach(key => {
      const [from, to] = key.split('|');
      const fEl = document.getElementById('n-' + from);
      const tEl = document.getElementById('n-' + to);
      if (!fEl || !tEl) return;
      const inActiveFlow = activeFlow.steps.some(s => s.from === from && s.to === to);
      if (inActiveFlow) return;
      const fc = nodeCenter(fEl);
      const tc = nodeCenter(tEl);
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', bezier(fc, tc));
      path.setAttribute('class', 'flow-path dim');
      svg.appendChild(path);
    });
  }

  if (!activeFlow) {
    // just draw all edges dimly
    const allEdges = new Set();
    activeWF.flows.forEach(fl => {
      fl.steps.forEach(s => allEdges.add(s.from + '|' + s.to));
    });
    allEdges.forEach(key => {
      const [from, to] = key.split('|');
      const fEl = document.getElementById('n-' + from);
      const tEl = document.getElementById('n-' + to);
      if (!fEl || !tEl) return;
      const fc = nodeCenter(fEl);
      const tc = nodeCenter(tEl);
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', bezier(fc, tc));
      path.setAttribute('class', 'flow-path dim');
      svg.appendChild(path);
    });
    return;
  }

  // active flow paths + numbered badges
  activeFlow.steps.forEach((step, i) => {
    const fEl = document.getElementById('n-' + step.from);
    const tEl = document.getElementById('n-' + step.to);
    if (!fEl || !tEl) return;

    const fc = nodeCenter(fEl);
    const tc = nodeCenter(tEl);

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', bezier(fc, tc));
    path.setAttribute('class', 'flow-path active');
    svg.appendChild(path);

    // midpoint badge
    const mx = (fc.x + tc.x) / 2;
    const my = (fc.y + tc.y) / 2 - 4;
    const badge = document.createElement('div');
    badge.className = 'edge-badge';
    badge.textContent = String(i + 1);
    badge.style.left = (mx - 9) + 'px';
    badge.style.top  = (my - 9) + 'px';
    canvas.appendChild(badge);
    badges.push(badge);
    setTimeout(() => badge.classList.add('visible'), i * 60 + 100);
  });
}

function bezier(a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  const cx1 = a.x + dx * 0.45;
  const cy1 = a.y + dy * 0.05;
  const cx2 = a.x + dx * 0.55;
  const cy2 = a.y + dy * 0.95;
  return `M ${a.x} ${a.y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${b.x} ${b.y}`;
}

// ═══════════════════════════════════════
// RENDER SIDEBAR FLOWS LIST
// ═══════════════════════════════════════
function renderFlowsList() {
  const list = document.getElementById('flows-list');
  list.innerHTML = activeWF.flows.map(fl => `
    <div class="flow-item ${activeFlow?.id === fl.id ? 'active' : ''}" data-flow="${fl.id}">
      <div class="flow-name">${fl.name}</div>
      <div class="flow-desc">${fl.desc}</div>
    </div>
  `).join('');
  list.querySelectorAll('.flow-item').forEach(el => {
    el.addEventListener('click', () => {
      const fl = activeWF.flows.find(f => f.id === el.dataset.flow);
      activeFlow = activeFlow?.id === fl.id ? null : fl;
      renderFlowsList();
      renderNodes();
      renderPaths();
      renderSteps();
    });
  });
}

// ═══════════════════════════════════════
// RENDER STEPS PANEL
// ═══════════════════════════════════════
function renderSteps() {
  const panel = document.getElementById('steps-panel');
  const empty = document.getElementById('steps-empty');

  if (!activeFlow) {
    empty.style.display = 'block';
    panel.querySelectorAll('.step-item').forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';
  panel.querySelectorAll('.step-item').forEach(el => el.remove());

  activeFlow.steps.forEach((step, i) => {
    const fromNode = activeWF.nodes.find(n => n.id === step.from);
    const toNode   = activeWF.nodes.find(n => n.id === step.to);
    const el = document.createElement('div');
    el.className = 'step-item';
    el.id = 'step-' + i;
    el.innerHTML = `
      <div class="step-num">${i + 1}</div>
      <div class="step-body">
        <div class="step-route">
          ${fromNode?.name ?? step.from}
          <span class="step-arrow">→</span>
          <span class="step-to">${toNode?.name ?? step.to}</span>
        </div>
        <div class="step-data">${step.data}</div>
      </div>
    `;
    panel.appendChild(el);
    setTimeout(() => el.classList.add('show'), i * 60 + 80);
  });
}

// ═══════════════════════════════════════
// CLEAR BUTTON
// ═══════════════════════════════════════
document.getElementById('clear-btn').addEventListener('click', () => {
  activeFlow = null;
  renderFlowsList();
  renderNodes();
  renderPaths();
  renderSteps();
});

// ═══════════════════════════════════════
// FULL RENDER
// ═══════════════════════════════════════
function render() {
  renderTabs();
  renderLanes();
  renderNodes();
  // paths need layout to be painted first
  requestAnimationFrame(() => {
    renderPaths();
  });
  renderFlowsList();
  renderSteps();
}

window.addEventListener('resize', () => {
  if (activeFlow) requestAnimationFrame(renderPaths);
});

render();
</script>
